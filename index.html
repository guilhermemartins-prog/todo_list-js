<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de tarefas</title>
    <script src="js/scripts.js" defer></script>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="shortcut icon" href="assets/todo_list.png" type="image/x-icon" />
  </head>
  <body>
    <div class="container">
      <h1>Minha Lista de Tarefas</h1>

      <div class="input-container">
        <input type="text" id="novaTarefa" placeholder="Digite uma tarefa" />
        <button id="adicionar">Adicionar Tarefa</button>
      </div>

      <ul id="listaTarefas"></ul>

      <div class="instrucoes">
        <h3>Como usar:</h3>
        <p>
          • <strong>1 clique </strong> Marca/desmarca como concluída<br />
          • <strong>2 clique </strong> Remove a tarefa
        </p>
      </div>
    </div>
  </body>
</html>
